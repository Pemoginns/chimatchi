<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F0A1E"/>
      <stop offset="100%" stop-color="#1A0A3A"/>
    </linearGradient>
    <linearGradient id="tg" x1="300" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#5B21B6" stop-opacity="0.35"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative glows -->
  <circle cx="1120" cy="60" r="280" fill="#7C3AED" fill-opacity="0.10"/>
  <circle cx="80"   cy="590" r="220" fill="#F97316" fill-opacity="0.08"/>
  <circle cx="600"  cy="680" r="340" fill="#5B21B6" fill-opacity="0.06"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#7C3AED" stroke-opacity="0.07" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#7C3AED" stroke-opacity="0.07" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="630"  stroke="#7C3AED" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630"  stroke="#7C3AED" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="900" y1="0" x2="900" y2="630"  stroke="#7C3AED" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Logo badge -->
  <rect x="546" y="100" width="108" height="108" rx="28" fill="url(#badge)" stroke="#7C3AED" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="600" y="175" font-family="Arial Black, Arial, sans-serif" font-size="62" font-weight="900" text-anchor="middle" fill="white">P</text>

  <!-- Main title -->
  <text x="600" y="358" font-family="Arial Black, Impact, sans-serif" font-size="118" font-weight="900" text-anchor="middle" fill="url(#tg)" letter-spacing="-3">Pondre</text>

  <!-- Subtitle -->
  <text x="600" y="418" font-family="Arial, sans-serif" font-size="32" font-weight="600" text-anchor="middle" fill="#A78BFA" letter-spacing="0.5">Multiplayer French Vocabulary Battle</text>

  <!-- Language pill -->
  <rect x="464" y="455" width="272" height="48" rx="24" fill="#7C3AED" fill-opacity="0.2" stroke="#7C3AED" stroke-opacity="0.45" stroke-width="1.5"/>
  <text x="600" y="485" font-family="Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle" fill="#C4B5FD" letter-spacing="1">French  vs  English</text>

  <!-- Dot accents -->
  <circle cx="180" cy="315" r="5" fill="#7C3AED" fill-opacity="0.6"/>
  <circle cx="202" cy="315" r="5" fill="#7C3AED" fill-opacity="0.4"/>
  <circle cx="224" cy="315" r="5" fill="#7C3AED" fill-opacity="0.2"/>
  <circle cx="976" cy="315" r="5" fill="#F97316" fill-opacity="0.2"/>
  <circle cx="998" cy="315" r="5" fill="#F97316" fill-opacity="0.4"/>
  <circle cx="1020" cy="315" r="5" fill="#F97316" fill-opacity="0.6"/>
</svg>
